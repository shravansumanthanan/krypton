version: '3.8'

services:
  krypton-browser:
    build:
      context: .
      dockerfile: Dockerfile
    image: krypton-browser:latest
    container_name: krypton-browser
    environment:
      # Pass DISPLAY from host if available
      - DISPLAY=${DISPLAY:-:0}
    volumes:
      # Mount X11 socket for GUI rendering on host
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    # Required for chromium sandbox, though we run with --no-sandbox
    cap_add:
      - SYS_ADMIN
    security_opt:
      - seccomp=unconfined
    command: >
      bash -c "
      if [ \"$DISPLAY\" = \":0\" ] && [ ! -S /tmp/.X11-unix/X0 ]; then
        echo 'X11 socket not found. Falling back to Xvfb headless mode...';
        export DISPLAY=:99;
        Xvfb :99 -screen 0 1280x1024x24 &
      fi;
      /app/linux-unpacked/kryptonbrowser --no-sandbox
      "
