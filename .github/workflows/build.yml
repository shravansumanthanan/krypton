name: Build & Test KryptonBrowser

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quality:
    name: Lint & Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: electron-app/package-lock.json
      - name: Install dependencies
        working-directory: electron-app
        run: npm ci
      - name: Run Linter
        working-directory: electron-app
        run: npm run lint
      - name: Security Audit
        working-directory: electron-app
        run: npm audit --audit-level=high

  test:
    name: Build & Test
    needs: quality
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
      fail-fast: false

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'npm'
        cache-dependency-path: electron-app/package-lock.json

    - name: Install dependencies
      working-directory: electron-app
      run: npm ci

    - name: Install Linux build dependencies
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake ninja-build xvfb

    - name: Install macOS build dependencies
      if: matrix.os == 'macos-latest'
      run: brew install cmake ninja

    - name: Install Windows build dependencies
      if: matrix.os == 'windows-latest'
      run: choco install cmake ninja -y

    - name: Build Native PQC Addon
      working-directory: electron-app
      run: npm run build:native

    - name: Build UI
      working-directory: electron-app
      run: npm run build:ui

    - name: Run Unit Tests
      working-directory: electron-app
      run: npm run test:unit

    - name: Install Playwright Browsers
      working-directory: electron-app
      run: npx playwright install --with-deps

    - name: Run E2E Tests
      working-directory: electron-app
      run: |
        if [ "$RUNNER_OS" == "Linux" ]; then
          xvfb-run --auto-servernum --server-args="-screen 0 1280x960x24" npm run test:e2e
        else
          npm run test:e2e
        fi
      shell: bash
      timeout-minutes: 5

    - name: Upload Playwright Report
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: playwright-report
        path: electron-app/playwright-report/
        retention-days: 7

    - name: Package Application
      working-directory: electron-app
      run: npm run build:dir
